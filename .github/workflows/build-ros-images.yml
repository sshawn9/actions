name: build-ros-images

on:
  workflow_dispatch:
    inputs:
      build_melodic:
        description: 'melodic'
        type: boolean
        default: true
      build_noetic:
        description: 'noetic'
        type: boolean
        default: true
      build_humble:
        description: 'humble'
        type: boolean
        default: true
      build_jazzy:
        description: 'jazzy'
        type: boolean
        default: true
      stage_base:
        description: 'base'
        type: boolean
        default: true
      stage_desktop:
        description: 'desktop'
        type: boolean
        default: true
      stage_box:
        description: 'box'
        type: boolean
        default: true

jobs:
  validate-and-gen-matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      count:  ${{ steps.gen.outputs.count }}
    steps:
      - id: gen
        shell: bash
        run: |
          set -euo pipefail

          distros=()
          [[ "${{ inputs.build_melodic }}" == "true" ]] && distros+=(melodic)
          [[ "${{ inputs.build_noetic }}"  == "true" ]] && distros+=(noetic)
          [[ "${{ inputs.build_humble }}"  == "true" ]] && distros+=(humble)
          [[ "${{ inputs.build_jazzy }}"   == "true" ]] && distros+=(jazzy)
          [[ ${#distros[@]} -eq 0 ]] && echo "::error::At least one distro must be selected" && exit 1

          stages=()
          [[ "${{ inputs.stage_base }}"    == "true" ]] && stages+=(base)
          [[ "${{ inputs.stage_desktop }}" == "true" ]] && stages+=(desktop)
          [[ "${{ inputs.stage_box }}"     == "true" ]] && stages+=(box)
          [[ ${#stages[@]} -eq 0 ]] && echo "::error::At least one stage must be selected" && exit 1

          matrix='[]'
          for d in "${distros[@]}"; do
            for a in amd64 arm64; do
              matrix="$(jq -c --arg d "$d" --arg a "$a" '. + [{"distro":$d,"arch":$a}]' <<< "$matrix")"
            done
          done

          echo "count=$(jq 'length' <<< "$matrix")" >> "$GITHUB_OUTPUT"
          echo "matrix={\"include\":$matrix}"        >> "$GITHUB_OUTPUT"

  build:
    needs: validate-and-gen-matrix
    if: needs.validate-and-gen-matrix.outputs.count != '0'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.validate-and-gen-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build
        shell: bash
        working-directory: build-ros-images
        env:
          DISTRO: ${{ matrix.distro }}
          GITEE_PAT: ${{ secrets.GITEE_PAT }}
        run: |
          set -euo pipefail
          source build.sh

          [[ "${{ inputs.stage_base }}"    == "true" ]] && build_base    "$DISTRO"
          [[ "${{ inputs.stage_desktop }}" == "true" ]] && build_desktop "$DISTRO"
          [[ "${{ inputs.stage_box }}"     == "true" ]] && build_box     "$DISTRO"
